version: '3.8'

services:
  sresource:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sresource-dev
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/app/docs:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      - ./app.py:/app/app.py:ro
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
    restart: unless-stopped
    networks:
      - sresource
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sresource:
    driver: bridge