apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

commonLabels:
  app: sresource
  managed-by: kustomize

commonAnnotations:
  description: SRESource - Production debugging and operations guide

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

replicas:
  - name: sresource
    count: 2

images:
  - name: atamsekar/sresource
    newTag: latest