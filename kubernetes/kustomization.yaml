namespace: default

labels:
  - includeSelectors: true
    pairs:
      app: sresource
      managed-by: kustomize

annotations:
  - includeSelectors: true
    pairs:
      description: SRESource - Production debugging and operations guide

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

replicas:
  - name: sresource
    count: 2

images:
  - name: atamsekar/sresource
    newTag: latest
