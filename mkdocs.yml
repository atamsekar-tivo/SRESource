site_name: SRESource
site_description: Comprehensive production debugging and operations guide for SRE/DevOps/Platform Engineers
site_author: Anirudh Tamsekar
repo_url: https://github.com/atamsekar-tivo/SRESource
repo_name: SRESource
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Getting Started: FORMATTING_GUIDE.md
  - Kubernetes Python API: k8s-python-api.html
  - Kubernetes:
      - Kubernetes Debugging: kubernetes-debugging-commands.html
      - EKS Production Guide: production-debugging-eks.html
  - Operating Systems:
      - Unix/Linux Debugging: production-debugging-unix-linux.html
      - Linux Internals: linux-internals.html
  - Networking:
      - Network Debugging: production-networking-debugging.html
  - CI/CD:
      - CI/CD Tools & Platforms: production-debugging-ci-cd-tools.html
      - CI/CD Pipeline Templates: cicd-pipeline-templates.html
  - Cloud & Infrastructure:
      - IAM & Access Control: production-debugging-iam.html
      - Kafka Debugging: kafka-debugging.html
  - Databases:
      - MySQL & PostgreSQL: production-debugging-databases.html
  - Tools & Resources:
      - Essential Tools Guide: TOOLS_GUIDE.html
      - Python Automation & Debugging: python-debugging-libs.html
      - Root Cause Analysis Playbook: root-cause-analysis.html

theme:
  name: material
  logo: https://raw.githubusercontent.com/atamsekar-tivo/SRESource/main/docs/assets/sresource-logo.svg
  favicon: https://raw.githubusercontent.com/atamsekar-tivo/SRESource/main/docs/assets/favicon.ico
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - toc.integrate

plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      fallback_to_build_date: true

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - tables
  - admonition
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/atamsekar-tivo/SRESource
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/atamsekar-tivo
  generator: false

extra_css:
  - css/custom.css

copyright: |
  &copy; 2024-2026 Anirudh Tamsekar. Licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a>
